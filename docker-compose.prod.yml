services:
  app:
    image: ${DOCKERHUB_USERNAME}/${SERVICE_NAME}:latest
    container_name: ${SERVICE_NAME}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEPLOY=docker
    networks:
      - traefik_proxy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8317/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      # Logs theo quy chuẩn VetGo
      - /data/apps/${SERVICE_NAME}/logs:/CLIProxyAPI/logs
    labels:
      - "traefik.enable=true"

      # === CẤU HÌNH ROUTER DYNAMIC (Subdomain) ===
      # Bắt mọi domain bắt đầu bằng "proxy."
      # Ví dụ: proxy.petplus.vn, proxy.phanmemvet.vn
      - "traefik.http.routers.${SERVICE_NAME}.rule=HostRegexp(`^proxy\\..+`)"

      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=web"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}-svc"

      # CORS middleware cho API
      - "traefik.http.routers.${SERVICE_NAME}.middlewares=default-cors@file"

      # Port chính của CLIProxyAPI
      - "traefik.http.services.${SERVICE_NAME}-svc.loadbalancer.server.port=8317"

networks:
  traefik_proxy:
    external: true
