# Build and Deploy to Dev (GitOps)
#
# Flow:
#   1. Push to main → build Docker image with :latest
#   2. ArgoCD auto-pulls :latest for dev-apps namespace
#   3. Optional: rollout restart to pick up new image faster
#
name: Build and Deploy to Dev

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  SERVICE_NAME: cli-proxy-api
  DOCKERHUB_REPO: tinhthanh/cli-proxy-api

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Build Metadata
        run: |
          echo VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev") >> $GITHUB_ENV
          echo COMMIT=$(git rev-parse --short HEAD) >> $GITHUB_ENV
          echo BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.DOCKERHUB_REPO }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA Tag** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ env.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Dev** (\`proxy-dev.vetgo.tech\`) will auto-update via ArgoCD." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To promote to UAT/Prod, run the [Promote workflow](https://github.com/tinhthanh/vetgo-infra/actions/workflows/promote.yml) on **vetgo-infra** repo." >> $GITHUB_STEP_SUMMARY
